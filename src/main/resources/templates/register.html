<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .card{
            border-radius:15px;
            padding:25px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <h3 class="text-center mb-4">Create Account</h3>

                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success != null}" class="alert alert-success" th:text="${success}"></div>

                <form action="/register-user" method="post" enctype="multipart/form-data" onsubmit="return validateRegister()">

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Your full name" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Your email" required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Ex: Suraj#123" required>
                    </div>

                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" id="phone" name="phone" class="form-control" placeholder="Your 10-digit phone number">
                    </div>

                    <div class="mb-3">
                        <label>Skills</label>
                        <input type="text" name="skills" class="form-control" placeholder="Java, Spring Boot">
                    </div>

                    <div class="mb-3">
                        <label>Education</label>
                        <select name="education" class="form-control">
                            <option value="Student">Student</option>
                            <option value="Graduate">Graduate</option>
                            <option value="Employee">Employee</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Upload Photo</label>
                        <input type="file" name="photoFile" class="form-control">
                    </div>

                    <button class="btn btn-primary w-100">Register</button>
                </form>

                <div class="text-center mt-3">
                    <a href="/login">Already have account?</a>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
function validateRegister(){
    const password = document.getElementById('password').value;
    const phone = document.getElementById('phone').value;

    const strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}$/;
    if(!strongPassword.test(password)){
        alert("Password must contain:\n- Minimum 6 characters\n- At least 1 uppercase letter\n- At least 1 lowercase letter\n- At least 1 number\n- At least 1 special character");
        return false;
    }

    if(phone && !/^[0-9]{10}$/.test(phone)){
        alert("Phone number must be 10 digits");
        return false;
    }

    return true;
}
</script>

</body>
</html>
