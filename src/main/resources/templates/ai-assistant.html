<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #chat-box { height: 400px; overflow-y: scroll; border: 1px solid #ddd; padding: 10px; background:#f9f9f9; }
        .user-msg { text-align: right; color: white; background: #007bff; padding:5px 10px; border-radius: 10px; margin:5px; display:inline-block; }
        .ai-msg { text-align: left; color: black; background: #e2e2e2; padding:5px 10px; border-radius: 10px; margin:5px; display:inline-block; }
    </style>
</head>
<body class="p-4">

<h2>🤖 AI Assistant</h2>

<div id="chat-box"></div>

<div class="mt-3">
    <input type="text" id="question" placeholder="Ask me anything..." class="form-control" />
    <button id="sendBtn" class="btn btn-primary mt-2">Send</button>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const questionInput = document.getElementById("question");
    const sendBtn = document.getElementById("sendBtn");

    function appendMessage(sender, message){
        const div = document.createElement("div");
        div.className = sender === 'user' ? "user-msg" : "ai-msg";
        div.textContent = message;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendQuestion(){
        const question = questionInput.value.trim();
        if(!question) return;

        appendMessage('user', question);
        questionInput.value = '';

        try{
            const response = await fetch('/career/ai/ask', {
                method:'POST',
                headers: { 'Content-Type':'application/x-www-form-urlencoded' },
                body: 'question=' + encodeURIComponent(question)
            });
            const answer = await response.text();
            appendMessage('ai', answer);
        } catch(err){
            appendMessage('ai', 'Error: Could not reach AI.');
        }
    }

    sendBtn.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if(e.key==='Enter') sendQuestion(); });
</script>

</body>
</html>
