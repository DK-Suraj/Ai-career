<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: Arial, sans-serif; }
        .otp-container { max-width: 500px; margin: 80px auto; }
        .otp-card { background: white; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); padding: 30px; }
        .otp-header { font-size: 22px; font-weight: bold; text-align: center; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="otp-container">
        <div class="otp-card">
            <div class="otp-header">Verify Your Account</div>

            <!-- Show error/success -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/verify-otp}" method="post">
                <!-- Hidden fields -->
                <input type="hidden" th:if="${email}" name="email" th:value="${email}">
                <input type="hidden" th:if="${phone}" name="phone" th:value="${phone}">

                <!-- OTP input -->
                <div class="mb-3">
                    <label for="otp" class="form-label">Enter OTP sent to your email/phone</label>
                    <input type="text" name="otp" id="otp" class="form-control" required maxlength="6">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary w-100">Verify OTP</button>
                </div>
            </form>

            <div class="mt-3 text-center">
                <a href="/login">⬅ Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
