<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .card{
            border-radius:15px;
            padding:25px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <h3 class="text-center mb-4">Login</h3>

                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success != null}" class="alert alert-success" th:text="${success}"></div>

                <form action="/login-user" method="post" onsubmit="return validateLogin()">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>

                    <button class="btn btn-success w-100">Login</button>
                </form>

                <div class="d-flex justify-content-between mt-3">
                    <a href="/register">Create account</a>
                    <a href="/forgot-password">Forgot Password?</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function validateLogin(){
    const password = document.getElementById('password').value;
    const strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}$/;
    if(!strongPassword.test(password)){
        alert("Password must contain:\n- Minimum 6 characters\n- At least 1 uppercase letter\n- At least 1 lowercase letter\n- At least 1 number\n- At least 1 special character");
        return false;
    }
    return true;
}
</script>

</body>
</html>
