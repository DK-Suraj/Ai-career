<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>AI Career Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* layout */

.container-main{
display:flex;
height:100vh;
}

/* sidebar */

.sidebar{
width:280px;
background:#1e293b;
color:white;
padding:25px;
text-align:center;
}

.sidebar h4{
margin-bottom:20px;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
margin-bottom:15px;
}

.profile-info{
margin-top:10px;
text-align:left;
}

.profile-info p{
margin:6px 0;
}

.logout-btn{
margin-top:20px;
width:100%;
}

/* main content */

.main{
flex:1;
padding:40px;
}

/* cards */

.card-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
transition:0.3s;
}

.card-box:hover{
transform:translateY(-5px);
}

.card-title{
font-size:20px;
margin-bottom:15px;
font-weight:bold;
}

/* dark mode */

.dark-mode{
background:#0f172a;
color:white;
}

.dark-mode .card-box{
background:#1e293b;
color:white;
}

</style>

</head>

<body>

<div class="container-main">

<!-- SIDEBAR -->

<div class="sidebar">

<h4>🚀 AI Career</h4>

<img th:src="@{'/uploads/' + ${photo}}" class="profile-img">


<div class="profile-info">

<p><b>Name:</b> <span th:text="${name}"></span></p>

<p><b>Email:</b> <span th:text="${email}"></span></p>

<p><b>Skills:</b> <span th:text="${skills}"></span></p>

<p><b>Phone:</b> <span th:text="${phone}"></span></p>

</div>

<button onclick="toggleDark()" class="btn btn-light mt-3">
Dark / Light
</button>

<a href="/logout" class="btn btn-danger logout-btn">
Logout
</a>

</div>


<!-- MAIN -->

<div class="main">

<!-- Skill Analyzer -->

<div class="card-box">

<div class="card-title">
🧠 Skill Analyzer
</div>

<form action="/career/add-skill" method="post">

<input type="text" name="skill" class="form-control" placeholder="Java, Python">

<button class="btn btn-primary mt-3">
Analyze Career
</button>

</form>

</div>


<!-- Resume Analyzer -->

<div class="card-box">

<div class="card-title">
📄 Resume Analyzer
</div>

<form action="/career/upload-resume" method="post" enctype="multipart/form-data">

	<input type="file" name="file" accept="application/pdf" class="form-control" required>

<button class="btn btn-success mt-3">
Analyze Resume
</button>

</form>

</div>


<!-- AI Assistant -->

<div class="card-box">

<div class="card-title">
🤖 AI Assistant
</div>

<form action="/career/ask-ai" method="post">

<input type="text" name="question" class="form-control" placeholder="Ask career question">

<button class="btn btn-dark mt-3">
Ask AI
</button>

</form>

</div>

</div>

</div>

<script>

function toggleDark(){
document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
